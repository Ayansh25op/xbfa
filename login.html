<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XBFA | Login</title>
    <style>
        :root {
            --bg-color: #0a0a0a;
            --card-bg: #121212;
            --accent-green: #00FF88; /* Matching your Dashboard color */
            --text-main: #ffffff;
            --text-dim: #a0a0a0;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-main);
        }

        /* Background glow effect for a modern feel */
        body::before {
            content: "";
            position: absolute;
            width: 300px;
            height: 300px;
            background: var(--accent-green);
            filter: blur(150px);
            opacity: 0.1;
            z-index: -1;
        }

        .login-container {
            background-color: var(--card-bg);
            padding: 40px;
            border-radius: 12px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            border: 1px solid #222;
            text-align: center;
        }

        .logo {
            font-size: 2.5rem;
            font-weight: 900;
            font-style: italic;
            margin-bottom: 10px;
            letter-spacing: -1px;
        }

        .logo span {
            color: var(--accent-green);
        }

        .subtitle {
            color: var(--text-dim);
            font-size: 0.9rem;
            margin-bottom: 30px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .form-group {
            text-align: left;
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.8rem;
            color: var(--text-dim);
            text-transform: uppercase;
            font-weight: bold;
        }

        input {
            width: 100%;
            padding: 12px 15px;
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 6px;
            color: white;
            outline: none;
            transition: 0.3s;
        }

        input:focus {
            border-color: var(--accent-green);
            box-shadow: 0 0 8px rgba(0, 255, 136, 0.2);
        }

        .login-btn {
            width: 100%;
            padding: 14px;
            background-color: var(--accent-green);
            color: black;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            margin-top: 10px;
            transition: 0.3s ease;
            text-transform: uppercase;
        }

        .login-btn:hover {
            background-color: #00cc6d;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 255, 136, 0.3);
        }

        .footer-links {
            margin-top: 25px;
            font-size: 0.8rem;
            color: var(--text-dim);
        }

        .footer-links a {
            color: var(--accent-green);
            text-decoration: none;
        }

        /* Error message style */
        #error-msg {
            color: #ff4d4d;
            font-size: 0.85rem;
            margin-bottom: 15px;
            display: none;
        }
    </style>
</head>
<body>

    <div class="login-container">
        <div class="logo">XB<span>FA</span></div>
        <div class="subtitle">Database Access</div>

        <div id="error-msg">Invalid email or password</div>

        <form id="loginForm">
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" placeholder="Enter admin email" required>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>

            <button type="submit" id="auth-btn" class="login-btn">Sign In</button>
        </form>

        <div class="footer-links" id="loading-spinner" style="display: none;">
            <div style="width: 20px; height: 20px; border: 2px solid var(--accent-green); border-top-color: transparent; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto; margin-top: 15px;"></div>
        </div>

        <div class="footer-links" style="margin-top: 20px; border-top: 1px solid rgba(255,255,255,0.05); padding-top: 15px;">
            <p style="font-size: 0.75rem; opacity: 0.5;">Master Admin Access Required</p>
        </div>
    </div>

    <script type="module">
        import { supabase } from './supabase.js'

        const authBtn = document.getElementById('auth-btn');
        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');
        const errorMsg = document.getElementById('error-msg');
        const spinner = document.getElementById('loading-spinner');
        const subtitle = document.querySelector('.subtitle');

        // AUTO REDIRECT
        const checkSession = async () => {
            const { data: { session } } = await supabase.auth.getSession();
            if (session) {
                window.location.href = "index.html";
            }
        };
        checkSession();

        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const email = emailInput.value.trim();
            const password = passwordInput.value;
            
            errorMsg.style.display = "none";
            authBtn.disabled = true;
            spinner.style.display = "block";

            try {
                const { data, error } = await supabase.auth.signInWithPassword({
                    email,
                    password
                });
                
                if (error) throw error;
                
                if (data.session) {
                    window.location.href = "index.html";
                }
            } catch (error) {
                console.error("Auth error:", error);
                errorMsg.innerText = "Access Denied: Invalid Credentials";
                errorMsg.style.display = "block";
                passwordInput.value = "";

                const container = document.querySelector('.login-container');
                container.style.animation = "shake 0.4s";
                setTimeout(() => container.style.animation = "", 400);
            } finally {
                authBtn.disabled = false;
                spinner.style.display = "none";
            }
        });
    </script>

    <style>
        @keyframes shake {
            0% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            50% { transform: translateX(5px); }
            75% { transform: translateX(-5px); }
            100% { transform: translateX(0); }
        }
    </style>
</body>
</html>
