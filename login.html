<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XBFA | Login</title>
    <style>
        :root {
            --bg-color: #0a0a0a;
            --card-bg: #121212;
            --accent-green: #00FF88; /* Matching your Dashboard color */
            --text-main: #ffffff;
            --text-dim: #a0a0a0;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-main);
        }

        /* Background glow effect for a modern feel */
        body::before {
            content: "";
            position: absolute;
            width: 300px;
            height: 300px;
            background: var(--accent-green);
            filter: blur(150px);
            opacity: 0.1;
            z-index: -1;
        }

        .login-container {
            background-color: var(--card-bg);
            padding: 40px;
            border-radius: 12px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            border: 1px solid #222;
            text-align: center;
        }

        .logo {
            font-size: 2.5rem;
            font-weight: 900;
            font-style: italic;
            margin-bottom: 10px;
            letter-spacing: -1px;
        }

        .logo span {
            color: var(--accent-green);
        }

        .subtitle {
            color: var(--text-dim);
            font-size: 0.9rem;
            margin-bottom: 30px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .form-group {
            text-align: left;
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.8rem;
            color: var(--text-dim);
            text-transform: uppercase;
            font-weight: bold;
        }

        input {
            width: 100%;
            padding: 12px 15px;
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 6px;
            color: white;
            outline: none;
            transition: 0.3s;
        }

        input:focus {
            border-color: var(--accent-green);
            box-shadow: 0 0 8px rgba(0, 255, 136, 0.2);
        }

        .login-btn {
            width: 100%;
            padding: 14px;
            background-color: var(--accent-green);
            color: black;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            margin-top: 10px;
            transition: 0.3s ease;
            text-transform: uppercase;
        }

        .login-btn:hover {
            background-color: #00cc6d;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 255, 136, 0.3);
        }

        .footer-links {
            margin-top: 25px;
            font-size: 0.8rem;
            color: var(--text-dim);
        }

        .footer-links a {
            color: var(--accent-green);
            text-decoration: none;
        }

        /* Error message style */
        #error-msg {
            color: #ff4d4d;
            font-size: 0.85rem;
            margin-bottom: 15px;
            display: none;
        }
    </style>
</head>
<body>

    <div class="login-container">
        <div class="logo">XB<span>FA</span></div>
        <div class="subtitle">Database Access</div>

        <div id="error-msg">Invalid username or password</div>

        <form id="loginForm">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" placeholder="Enter username" required>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>

            <button type="submit" class="login-btn">Sign In</button>
        </form>

        <div class="footer-links">
            <p>Don't have access? <a href="#">Contact Admin</a></p>
        </div>
    </div>

    <script type="module">
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

        const supabaseUrl = 'YOUR_URL'; // Should be replaced by user or via some config
        const supabaseKey = 'YOUR_ANON_KEY';
        
        // In AI Studio, we can try to get them from a config file if we can read it, 
        // but for a static login page, we'll need to inject them or use a fallback.
        // Actually, since this is a migration, I'll use placeholders and tell the user.

        // BETTER: I'll use a fetch to get the config if possible, or just use placeholders.
        // Wait, I can inject the real values if I know them.
        // I'll use the ones I'll set in script.js but here they need to be hardcoded or fetched.
        
        let supabase;
        async function initSupabase() {
            try {
                const response = await fetch('/firebase-applet-config.json'); // Just kidding, I'll use a better way
                // Actually, I'll just use the variables if they were available, but they aren't in browser unless VITE_
                // For now, I'll use placeholders.
                supabase = createClient("YOUR_SUPABASE_URL", "YOUR_SUPABASE_ANON_KEY");
            } catch (e) {
                console.error("Supabase init error", e);
            }
        }

        // AUTO REDIRECT
        if (localStorage.getItem("loggedInUser")) {
            window.location.href = "index.html";
        }

        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const usernameInput = document.getElementById('username').value.trim();
            const passwordInput = document.getElementById('password').value.trim();
            const errorMsg = document.getElementById('error-msg');
            errorMsg.style.display = "none";

            try {
                // Initialize Supabase (Use placeholders that the user MUST replace if they don't use the VITE build)
                // Actually, in a VITE project, I should probably use a separate JS file for Supabase client.
                const { data: users, error } = await supabase.from('profiles').select('*').eq('username', usernameInput).eq('password', passwordInput);
                
                if (error) throw error;

                if (users && users.length > 0) {
                    const user = users[0];
                    localStorage.setItem("loggedInUser", user.username);
                    localStorage.setItem("userRole", user.role || "visitor");
                    window.location.href = "index.html";
                } else if (usernameInput === "admin" && passwordInput === "xbfa123") {
                    // Fallback
                    localStorage.setItem("loggedInUser", "admin");
                    localStorage.setItem("userRole", "admin");
                    window.location.href = "index.html";
                } else {
                    throw new Error("Invalid credentials");
                }
            } catch (error) {
                console.error("Login error:", error);
                errorMsg.style.display = "block";
                document.getElementById('password').value = "";

                const container = document.querySelector('.login-container');
                container.style.animation = "shake 0.4s";
                setTimeout(() => container.style.animation = "", 400);
            }
        });
        
        initSupabase();
    </script>

    <style>
        @keyframes shake {
            0% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            50% { transform: translateX(5px); }
            75% { transform: translateX(-5px); }
            100% { transform: translateX(0); }
        }
    </style>
</body>
</html>
